name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # The desktop crate links Tauri 2, which needs GTK/WebKit/glib system
    # libraries (and pkg-config to find them) to compile on Linux.
    - name: Install Tauri Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          pkg-config \
          libglib2.0-dev \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libjavascriptcoregtk-4.1-dev \
          libsoup-3.0-dev \
          librsvg2-dev \
          libssl-dev

    - name: Cache Rust build
      uses: Swatinem/rust-cache@v2

    # --no-default-features skips the embedded mistral.rs runtime (GPU/CPU model
    # inference), which only ships in the Windows build. The unit tests are
    # runtime-agnostic, so this keeps CI fast without losing coverage.
    - name: Build
      run: cargo build --no-default-features --verbose
    - name: Run tests
      run: cargo test --no-default-features --verbose
